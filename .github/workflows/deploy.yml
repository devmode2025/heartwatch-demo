name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint code
        run: npx nx lint heartwatch-demo
        
      - name: Check code formatting
        run: npx prettier --check "src/**/*.{ts,html,scss,css,json}"
        
      # TODO: Enable when tests are properly configured with NgRx mocks
      # - name: Run unit tests
      #   run: npx nx test heartwatch-demo --watch=false
        
      - name: Build application
        run: npx nx build --configuration=production
        
      - name: Copy CNAME to dist
        run: cp CNAME dist/heartwatch-demo/browser/
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/heartwatch-demo/browser
          publish_branch: gh-pages
          cname: demo.heartwatch.dev
